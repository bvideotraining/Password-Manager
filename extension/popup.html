<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>SecureVault</title>
  <style>
    body {
      width: 300px;
      font-family: system-ui, -apple-system, sans-serif;
      margin: 0;
      padding: 16px;
      background: #f9fafb;
    }
    h2 {
      margin-top: 0;
      font-size: 18px;
      color: #111827;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .form-group {
      margin-bottom: 12px;
    }
    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: #374151;
      margin-bottom: 4px;
    }
    input {
      width: 100%;
      padding: 8px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      box-sizing: border-box;
    }
    button {
      width: 100%;
      padding: 8px;
      background: #10b981;
      color: white;
      border: none;
      border-radius: 6px;
      font-weight: 500;
      cursor: pointer;
    }
    button:hover {
      background: #059669;
    }
    .success {
      color: #10b981;
      font-size: 12px;
      margin-top: 8px;
      display: none;
    }
    .credential-list {
      margin-top: 16px;
      border-top: 1px solid #e5e7eb;
      padding-top: 16px;
    }
    .credential-item {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      padding: 10px;
      margin-bottom: 8px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .credential-item .user {
      font-size: 13px;
      font-weight: 600;
      color: #111827;
    }
    .credential-item .pass-row {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 8px;
    }
    .credential-item .pass {
      font-family: monospace;
      font-size: 12px;
      color: #6b7280;
      margin-right: auto;
    }
    .action-btn {
      background: #f3f4f6;
      color: #374151;
      border: 1px solid #d1d5db;
      padding: 4px 8px;
      font-size: 11px;
      width: auto;
      border-radius: 4px;
      cursor: pointer;
    }
    .action-btn:hover {
      background: #e5e7eb;
    }
    .action-btn.primary {
      background: #10b981;
      color: white;
      border-color: #059669;
    }
    .action-btn.primary:hover {
      background: #059669;
    }
    .generator-section {
      margin-top: 16px;
      border-top: 1px solid #e5e7eb;
      padding-top: 16px;
    }
    .sync-section {
      margin-top: 16px;
      text-align: center;
      border-top: 1px solid #e5e7eb;
      padding-top: 12px;
    }
    .sync-link {
      font-size: 11px;
      color: #10b981;
      text-decoration: none;
      cursor: pointer;
    }
    .sync-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <h2>
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
    SecureVault
  </h2>
  
  <div id="credentialsContainer" class="credential-list" style="display: none;">
    <label>Credentials for this site</label>
    <div id="credentialsList"></div>
  </div>

  <div style="margin-top: 16px;">
    <label style="font-weight: 600; margin-bottom: 8px; display: block;">Add New</label>
    <div class="form-group">
      <label>Domain</label>
      <input type="text" id="domain" readonly>
    </div>
    <div class="form-group">
      <label>Username</label>
      <input type="text" id="username" placeholder="username">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••">
    </div>
    <button id="saveBtn">Save Credential</button>
    <div id="successMsg" class="success">Saved successfully!</div>
  </div>

  <div class="generator-section">
    <label style="font-weight: 600; margin-bottom: 8px; display: block;">Generate Password</label>
    <div class="form-group" style="display: flex; gap: 8px;">
      <input type="text" id="genPassword" readonly style="flex: 1;">
      <button id="genBtn" class="action-btn" style="width: auto;">New</button>
    </div>
    <button id="copyGenBtn" class="action-btn" style="width: 100%;">Copy Generated</button>
  </div>

  <div class="sync-section">
    <a id="syncBtn" class="sync-link">Sync with Web App</a>
  </div>

  <script src="popup.js" type="module"></script>
</body>
</html>
