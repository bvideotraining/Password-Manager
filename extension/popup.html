<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>SecureVault</title>
  <style>
    body {
      width: 300px;
      font-family: system-ui, -apple-system, sans-serif;
      margin: 0;
      padding: 16px;
      background: #f9fafb;
    }
    h2 {
      margin-top: 0;
      font-size: 18px;
      color: #111827;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .form-group {
      margin-bottom: 12px;
    }
    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: #374151;
      margin-bottom: 4px;
    }
    input {
      width: 100%;
      padding: 8px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      box-sizing: border-box;
    }
    button {
      width: 100%;
      padding: 8px;
      background: #10b981;
      color: white;
      border: none;
      border-radius: 6px;
      font-weight: 500;
      cursor: pointer;
    }
    button:hover {
      background: #059669;
    }
    .success {
      color: #10b981;
      font-size: 12px;
      margin-top: 8px;
      display: none;
    }
  </style>
</head>
<body>
  <h2>
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
    SecureVault
  </h2>
  
  <div class="form-group">
    <label>Domain</label>
    <input type="text" id="domain" readonly>
  </div>
  <div class="form-group">
    <label>Username</label>
    <input type="text" id="username" placeholder="username">
  </div>
  <div class="form-group">
    <label>Password</label>
    <input type="password" id="password" placeholder="••••••••">
  </div>
  <button id="saveBtn">Save Credential</button>
  <div id="successMsg" class="success">Saved successfully!</div>

  <script src="popup.js" type="module"></script>
</body>
</html>
