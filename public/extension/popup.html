<!DOCTYPE html>
<html>
<head>
  <title>SecureVault</title>
  <style>
    body {
      width: 320px;
      height: 400px;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background-color: #09090b;
      color: #fafafa;
    }
    .header {
      display: flex;
      align-items: center;
      padding: 16px;
      border-bottom: 1px solid #27272a;
      background-color: #09090b;
    }
    .header h1 {
      margin: 0;
      font-size: 16px;
      font-weight: 600;
      margin-left: 8px;
    }
    .content {
      padding: 16px;
    }
    .input-group {
      margin-bottom: 16px;
    }
    label {
      display: block;
      font-size: 12px;
      margin-bottom: 4px;
      color: #a1a1aa;
    }
    input {
      width: 100%;
      box-sizing: border-box;
      padding: 8px 12px;
      border-radius: 6px;
      border: 1px solid #27272a;
      background-color: #09090b;
      color: #fafafa;
      font-size: 14px;
    }
    input:focus {
      outline: none;
      border-color: #10b981;
    }
    button {
      width: 100%;
      padding: 10px;
      border-radius: 6px;
      border: none;
      background-color: #10b981;
      color: #022c22;
      font-weight: 600;
      cursor: pointer;
      font-size: 14px;
    }
    button:hover {
      background-color: #059669;
    }
    .status {
      margin-top: 16px;
      font-size: 12px;
      text-align: center;
      color: #a1a1aa;
    }
  </style>
</head>
<body>
  <div class="header">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
    <h1>SecureVault</h1>
  </div>
  <div class="content" id="app">
    <div id="locked-view">
      <div class="input-group">
        <label for="master-password">Master Password</label>
        <input type="password" id="master-password" placeholder="Enter master password">
      </div>
      <button id="unlock-btn">Unlock Vault</button>
      <div class="status" id="status-msg">Vault is locked</div>
    </div>
    
    <div id="unlocked-view" style="display: none;">
      <p style="font-size: 14px; text-align: center; margin-bottom: 20px;">Vault Unlocked</p>
      <button id="lock-btn" style="background-color: #27272a; color: #fafafa;">Lock Vault</button>
      <button id="open-app-btn" style="margin-top: 10px;">Open Web App</button>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
